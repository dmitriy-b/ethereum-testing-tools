name: "Find Broken Commit via Hive Tests"
description: "Binary search through client commits to find which commit broke Hive test suite"

inputs:
  date:
    description: "Date when the tests started failing (e.g., '2024-10-01'). Required."
    required: true
  hive_command:
    description: "Hive command to run WITHOUT --client-file (e.g., './hive --sim ethereum/engine'). Required."
    required: true
  client_repo_url:
    description: "Client GitHub repository URL to bisect (e.g., 'https://github.com/NethermindEth/nethermind.git'). Required."
    required: true
  client_repo_branch:
    description: "Client branch to test."
    required: false
    default: "master"
  client_name:
    description: "Client name for Hive (nethermind, geth, besu, etc.)."
    required: false
    default: "nethermind"
  hive_repo_url:
    description: "Hive repository URL."
    required: false
    default: "https://github.com/ethereum/hive.git"
  hive_branch:
    description: "Hive branch to use."
    required: false
    default: "master"
  repo_token:
    description: "GitHub token for cloning private repositories. Use secrets.GITHUB_TOKEN for private repos."
    required: false
    default: ""
  good_ref:
    description: "Known good commit/branch reference in client repo. If not provided, searches from the date."
    required: false
    default: ""
  bad_ref:
    description: "Known bad commit/branch reference in client repo. Defaults to HEAD."
    required: false
    default: "HEAD"
  success_string:
    description: "String that must be present in output for the test to be considered successful."
    required: false
    default: ""
  error_string:
    description: "String in output that indicates test failure (e.g., 'FAIL', 'error')."
    required: false
    default: ""
  timeout:
    description: "Timeout in seconds for each test run (default: 3600 = 1 hour)"
    required: false
    default: "3600"
  go_version:
    description: "Go version to use for building Hive (default: stable)"
    required: false
    default: "stable"

outputs:
  last_good_commit:
    description: "The last commit that passed the test"
    value: ${{ steps.bisect.outputs.last_good_commit }}
  first_broken_commit:
    description: "The first commit that failed the test"
    value: ${{ steps.bisect.outputs.first_broken_commit }}

runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go_version }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install Linux packages
      shell: bash
      run: |
        set -euo pipefail
        if command -v apt-get >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y libsnappy-dev libc6-dev libc6 build-essential
        else
          echo "::warning::apt-get not available, skipping Linux package installation"
        fi

    - name: Verify prerequisites
      id: verify
      shell: bash
      run: |
        set -euo pipefail
        echo "Verifying Go..."
        go version
        
        echo "Verifying Docker..."
        docker --version
        
        echo "Verifying Git..."
        git --version

    - name: Run binary search for broken commit
      id: bisect
      shell: bash
      env:
        DATE: ${{ inputs.date }}
        HIVE_COMMAND: ${{ inputs.hive_command }}
        CLIENT_REPO_URL: ${{ inputs.client_repo_url }}
        CLIENT_REPO_BRANCH: ${{ inputs.client_repo_branch }}
        CLIENT_NAME: ${{ inputs.client_name }}
        HIVE_REPO_URL: ${{ inputs.hive_repo_url }}
        HIVE_BRANCH: ${{ inputs.hive_branch }}
        REPO_TOKEN: ${{ inputs.repo_token }}
        GOOD_REF: ${{ inputs.good_ref }}
        BAD_REF: ${{ inputs.bad_ref }}
        SUCCESS_STRING: ${{ inputs.success_string }}
        ERROR_STRING: ${{ inputs.error_string }}
        TIMEOUT: ${{ inputs.timeout }}
      run: |
        set -euo pipefail
        
        # Make script executable
        chmod +x "${{ github.action_path }}/find_broken_commit_hive.sh"
        
        # Build the command with required arguments
        cmd=("${{ github.action_path }}/find_broken_commit_hive.sh")
        cmd+=(--date "$DATE")
        cmd+=(--hive-command "$HIVE_COMMAND")
        cmd+=(--client-repo-url "$CLIENT_REPO_URL")
        
        # Add optional arguments if provided
        if [ -n "${CLIENT_REPO_BRANCH:-}" ]; then cmd+=(--client-repo-branch "$CLIENT_REPO_BRANCH"); fi
        if [ -n "${CLIENT_NAME:-}" ]; then cmd+=(--client-name "$CLIENT_NAME"); fi
        if [ -n "${HIVE_REPO_URL:-}" ]; then cmd+=(--hive-repo-url "$HIVE_REPO_URL"); fi
        if [ -n "${HIVE_BRANCH:-}" ]; then cmd+=(--hive-branch "$HIVE_BRANCH"); fi
        if [ -n "${REPO_TOKEN:-}" ]; then cmd+=(--repo-token "$REPO_TOKEN"); fi
        if [ -n "${GOOD_REF:-}" ]; then cmd+=(--good-ref "$GOOD_REF"); fi
        if [ -n "${BAD_REF:-}" ]; then cmd+=(--bad-ref "$BAD_REF"); fi
        if [ -n "${SUCCESS_STRING:-}" ]; then cmd+=(--success-string "$SUCCESS_STRING"); fi
        if [ -n "${ERROR_STRING:-}" ]; then cmd+=(--error-string "$ERROR_STRING"); fi
        if [ -n "${TIMEOUT:-}" ]; then cmd+=(--timeout "$TIMEOUT"); fi
        
        echo "::group::Running bisect command"
        echo "> ${cmd[*]}"
        echo "::endgroup::"
        
        # Run the script and capture output
        "${cmd[@]}" 2>&1 | tee /tmp/bisect_output.log
        
        # Extract commit hashes from output if available
        if grep -q "LAST GOOD COMMIT:" /tmp/bisect_output.log; then
          LAST_GOOD=$(grep "LAST GOOD COMMIT:" /tmp/bisect_output.log | awk '{print $NF}')
          echo "last_good_commit=$LAST_GOOD" >> "$GITHUB_OUTPUT"
          echo "::notice::Last good commit: $LAST_GOOD"
        fi
        
        if grep -q "FIRST BROKEN COMMIT:" /tmp/bisect_output.log; then
          FIRST_BROKEN=$(grep "FIRST BROKEN COMMIT:" /tmp/bisect_output.log | awk '{print $NF}')
          echo "first_broken_commit=$FIRST_BROKEN" >> "$GITHUB_OUTPUT"
          echo "::error::First broken commit: $FIRST_BROKEN"
        fi

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: hive-bisect-logs
        path: |
          /tmp/bisect_output.log
          /tmp/commit_*_logs.txt
          /tmp/hive_go_build.log
          /tmp/hive_go_get.log
        if-no-files-found: ignore
        retention-days: 7
